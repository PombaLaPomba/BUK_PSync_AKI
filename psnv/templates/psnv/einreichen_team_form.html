{% extends "base.html" %}
{% block title %}{{ titel }}{% endblock %}
{% block content %}
<h1>{{ titel }}</h1>
<form method="post" class="mt-3">
  {% csrf_token %}
  <h5>Standort</h5>
  {{ standort_form.as_p }}
  <h5>Angebot</h5>
  {{ team_form.as_p }}
  <button type="submit" class="btn btn-primary">Einreichen</button>
</form>
{% endblock %}
